stores:
  # # There is no default store but any ".use" for "mem/*" will be treated as "mem" store
  # # and the stores are created on demand when used.

  # # Example:
  # os/cwd:
  #   path: .flob
  # http/local:
  #   target: http://localhost:8080

server:
  # use: mem
  # addr: 0.0.0.0:8080

client:
  # use: http/local

otel:
  # exporters:
  #   pretty: {}
  # providers:
  #   logger:
  #     exporters:
  #       - pretty

  exporters:
    pretty: {}
    otlp/local:
      endpoint: localhost:4317
      tls:
        insecure: true
      sending_queue:
        enabled: false

  providers:
    tracer:
      exporters:
        - otlp/local
    logger:
      exporters:
        - pretty
        - otlp/local
